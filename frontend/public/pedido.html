<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Acompanhar Pedido — Dr. Coxinha</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="theme-color" content="#ff6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dr. Coxinha">
  <style>
    :root {
      --laranja-bg-p: #fff8f3;
      --laranja-borda-p: #ffe0cc;
      --laranja-sombra: rgba(255,102,0,0.15);
      --laranja-sombra-forte: rgba(255,102,0,0.28);
    }

    body {
      background: var(--laranja-bg-p);
      background-image:
        radial-gradient(circle at 20% 10%, #ffe0cc 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #fff8f3 0%, transparent 50%);
      padding-bottom: 100px;
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    .pedido-header {
      position: sticky;
      top: 0;
      background: white;
      padding: 14px 20px;
      box-shadow: 0 4px 20px var(--laranja-sombra);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--laranja-borda-p);
    }

    .pedido-header-logo {
      display: flex; align-items: center; gap: 10px;
    }

    .pedido-header-logo img {
      width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    }

    .pedido-header-logo h1 {
      font-size: 1.1rem; font-weight: 700; color: var(--laranja); line-height: 1;
    }
    .pedido-header-logo p {
      font-size: 0.68rem; color: var(--texto-suave); margin-top: 1px;
    }

    .badge-ao-vivo {
      background: #fff0e6;
      color: var(--laranja-esc);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid var(--laranja-borda-p);
    }

    .badge-ao-vivo::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--laranja);
      border-radius: 50%;
      animation: pulse-vivo 1.5s infinite;
    }

    @keyframes pulse-vivo {
      0% { box-shadow: 0 0 0 0 rgba(255,102,0,0.7); }
      70% { box-shadow: 0 0 0 8px rgba(255,102,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,102,0,0); }
    }

    /* ---- CONTAINER ---- */
    .pedido-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ---- CARD STATUS ---- */
    .status-card {
      background: white;
      border-radius: 22px;
      padding: 30px 22px 26px;
      margin-bottom: 14px;
      box-shadow: 0 6px 24px var(--laranja-sombra);
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--laranja-borda-p);
    }

    .status-card::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,102,0,0.10), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .status-pedido-id {
      font-size: 0.72rem;
      color: var(--texto-suave);
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .status-icone-grande {
      font-size: 4.5rem;
      margin: 12px 0 10px;
      display: inline-block;
      filter: drop-shadow(0 8px 16px rgba(255,102,0,0.25));
      animation: float-icone 3s ease-in-out infinite;
    }

    @keyframes float-icone {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-9px) rotate(-3deg); }
    }

    .status-titulo {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--laranja-esc);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .status-descricao {
      font-size: 0.9rem;
      color: var(--texto-suave);
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto 12px;
    }

    .status-tempo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #ffe0cc, #ffd0b5);
      color: var(--laranja-esc);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.82rem;
      box-shadow: 0 2px 8px rgba(255,102,0,0.15);
    }

    .status-card.cancelado .status-titulo { color: #b91c1c; }
    .status-card.cancelado .status-tempo { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #b91c1c; }
    .status-card.atualizado { animation: status-mudou 0.8s ease; }

    @keyframes status-mudou {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); box-shadow: 0 16px 50px var(--laranja-sombra-forte); }
      100% { transform: scale(1); }
    }

    /* ---- STEPS PROGRESS ---- */
    .steps-card {
      background: white;
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px var(--laranja-sombra);
      border: 1px solid var(--laranja-borda-p);
    }

    .steps-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--laranja-esc);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px dashed var(--laranja-borda-p);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      position: relative;
      padding-bottom: 20px;
    }

    .step:last-child { padding-bottom: 0; }

    .step-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .step-bolinha {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #bbb;
      font-weight: 800;
      border: 3px solid white;
      box-shadow: 0 0 0 2px var(--laranja-borda-p);
      transition: all 0.4s ease;
      z-index: 1;
    }

    .step-linha {
      width: 2px;
      flex: 1;
      min-height: 20px;
      background: var(--laranja-borda-p);
      margin-top: 4px;
      transition: background 0.5s ease;
    }

    .step:last-child .step-linha { display: none; }

    .step-conteudo {
      flex: 1;
      padding-top: 4px;
      min-width: 0;
    }

    .step-nome {
      font-weight: 700;
      font-size: 0.9rem;
      color: #bbb;
      margin-bottom: 2px;
      transition: color 0.3s ease;
    }

    .step-desc {
      font-size: 0.78rem;
      color: #ccc;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    .step-hora {
      font-size: 0.7rem;
      color: var(--texto-suave);
      font-weight: 700;
      margin-top: 2px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* step concluído */
    .step.concluido .step-bolinha {
      background: linear-gradient(135deg, var(--laranja), var(--laranja-cla));
      box-shadow: 0 0 0 2px var(--laranja-borda-p), 0 4px 8px rgba(255,102,0,0.25);
      color: white;
    }
    .step.concluido .step-linha { background: linear-gradient(180deg, var(--laranja), var(--laranja-borda-p)); }
    .step.concluido .step-nome { color: var(--laranja-esc); }
    .step.concluido .step-desc { color: var(--texto-suave); }
    .step.concluido .step-hora { opacity: 1; color: var(--laranja-esc); }

    /* step atual */
    .step.atual .step-bolinha {
      background: linear-gradient(135deg, var(--laranja), var(--laranja-esc));
      box-shadow: 0 0 0 4px var(--laranja-borda-p), 0 8px 20px var(--laranja-sombra-forte);
      color: white;
      transform: scale(1.2);
      animation: pulse-bolinha 2s infinite;
    }

    @keyframes pulse-bolinha {
      0%, 100% { box-shadow: 0 0 0 4px var(--laranja-borda-p), 0 8px 20px var(--laranja-sombra-forte); }
      50% { box-shadow: 0 0 0 10px rgba(255,102,0,0.15), 0 8px 25px var(--laranja-sombra-forte); }
    }

    .step.atual .step-nome { color: var(--laranja-esc); font-weight: 800; font-size: 1rem; }
    .step.atual .step-desc { color: var(--texto); }
    .step.atual .step-hora { opacity: 1; color: var(--laranja-esc); }

    /* step cancelado */
    .step.cancelado .step-bolinha {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      box-shadow: 0 0 0 2px #fee2e2;
      color: white;
    }
    .step.cancelado .step-nome { color: #b91c1c; }

    /* ---- INFO CARDS ---- */
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 20px 18px;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px var(--laranja-sombra);
      border: 1px solid var(--laranja-borda-p);
    }

    .info-card-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--laranja-esc);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-pedido {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px dashed var(--laranja-borda-p);
      font-size: 0.9rem;
    }
    .item-pedido:last-child { border-bottom: none; padding-bottom: 0; }
    .item-pedido-nome { font-weight: 700; margin-bottom: 2px; }
    .item-pedido-qtd { font-size: 0.75rem; color: var(--texto-suave); }
    .item-pedido-preco { font-weight: 800; color: var(--laranja-esc); white-space: nowrap; margin-left: 8px; }

    .totais { padding-top: 12px; border-top: 2px dashed var(--laranja-borda-p); margin-top: 8px; }
    .totais-linha {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 0.88rem;
    }
    .totais-linha.total {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--laranja-esc);
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid var(--laranja-borda-p);
    }

    .endereco-box {
      background: var(--laranja-bg);
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--laranja-borda-p);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .endereco-ref {
      display: inline-block;
      background: white;
      color: var(--laranja-esc);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 4px;
      border: 1px solid var(--laranja-borda-p);
    }

    .tipo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #ffe0cc, #ffd0b5);
      color: var(--laranja-esc);
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.78rem;
    }

    .obs-box {
      background: linear-gradient(135deg, #fff9e6, #fef3c7);
      border-left: 4px solid #fbbf24;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      color: #713f12;
      line-height: 1.5;
    }

    /* ---- PAGAMENTO ---- */
    .pagamento-linha {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.88rem;
      border-bottom: 1px dashed var(--laranja-borda-p);
    }
    .pagamento-linha:last-child { border-bottom: none; }
    .pagamento-key { color: var(--texto-suave); min-width: 100px; }
    .pagamento-val { font-weight: 700; }

    /* ---- AÇÕES ---- */
    .acoes-card {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-acao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.22s;
    }

    .btn-acao-primario {
      background: linear-gradient(135deg, var(--laranja), var(--laranja-esc));
      color: white;
      box-shadow: 0 6px 16px var(--laranja-sombra-forte);
    }
    .btn-acao-primario:hover { transform: translateY(-2px); box-shadow: 0 10px 24px var(--laranja-sombra-forte); }

    .btn-acao-secundario {
      background: white;
      color: var(--laranja-esc);
      border: 2px solid var(--laranja);
    }
    .btn-acao-secundario:hover { background: var(--laranja-bg); }

    .btn-acao-whats {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
      box-shadow: 0 4px 12px rgba(37,211,102,0.3);
    }
    .btn-acao-whats:hover { transform: translateY(-2px); }

    /* ---- BANNER PWA ---- */
    .pwa-banner {
      background: white;
      color: var(--laranja-esc);
      padding: 14px 18px;
      border-radius: 16px;
      margin-bottom: 12px;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px var(--laranja-sombra);
      border: 1px solid var(--laranja-borda-p);
    }
    .pwa-banner.visivel { display: flex; }
    .pwa-banner-icone { font-size: 1.8rem; flex-shrink: 0; }
    .pwa-banner-info { flex: 1; }
    .pwa-banner-titulo { font-weight: 800; font-size: 0.88rem; margin-bottom: 2px; }
    .pwa-banner-sub { font-size: 0.74rem; color: var(--texto-suave); }
    .pwa-banner-btn {
      background: linear-gradient(135deg, var(--laranja), var(--laranja-esc));
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.76rem;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 3px 8px var(--laranja-sombra-forte);
    }
    .pwa-banner-close {
      background: none; border: none; color: #ccc;
      cursor: pointer; font-size: 1.3rem; padding: 4px; line-height: 1;
    }
    .pwa-banner-close:hover { color: var(--laranja); }

    /* ---- SAUDAÇÃO ---- */
    .saudacao {
      text-align: center;
      color: var(--texto-suave);
      margin-bottom: saudacao 10px;
      font-size: 0.92rem;
    }
    .saudacao strong { color: var(--laranja-esc); font-size: 1.05rem; }

    /* ---- TOAST STATUS ---- */
    .toast-status {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-200px);
      background: white;
      border-radius: 18px;
      padding: 16px 20px;
      box-shadow: 0 12px 40px var(--laranja-sombra-forte), 0 4px 12px rgba(0,0,0,0.08);
      z-index: 9999;
      max-width: 92vw;
      width: 350px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-left: 5px solid var(--laranja);
      border-top: 1px solid var(--laranja-borda-p);
      border-right: 1px solid var(--laranja-borda-p);
      border-bottom: 1px solid var(--laranja-borda-p);
    }
    .toast-status.visivel { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-status-icone { font-size: 2rem; flex-shrink: 0; }
    .toast-status-conteudo { flex: 1; min-width: 0; }
    .toast-status-titulo { font-weight: 800; color: var(--laranja-esc); font-size: 0.95rem; margin-bottom: 2px; }
    .toast-status-sub { font-size: 0.8rem; color: var(--texto-suave); line-height: 1.3; }

    /* ---- SHIMMER / SKELETON ---- */
    .shimmer {
      background: linear-gradient(90deg, #fff0e6 25%, #fff8f3 50%, #fff0e6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton {
      padding: 28px 22px;
      background: white;
      border-radius: 22px;
      margin-bottom: 14px;
      border: 1px solid var(--laranja-borda-p);
    }
    .skeleton-circle { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; }
    .skeleton-line { height: 14px; margin-bottom: 10px; }
    .skeleton-line.short { width: 55%; margin: 0 auto 8px; }
    .skeleton-line.medium { width: 78%; margin: 0 auto 8px; }

    /* ---- ERRO ---- */
    .estado-vazio {
      text-align: center;
      padding: 60px 20px;
    }
    .estado-vazio .emoji { font-size: 4rem; display: block; margin-bottom: 12px; opacity: 0.5; }
    .estado-vazio h2 { font-size: 1.25rem; color: var(--laranja-esc); margin-bottom: 8px; }
    .estado-vazio p { font-size: 0.88rem; color: var(--texto-suave); line-height: 1.6; }

    /* ---- FOOTER ---- */
    .pedido-footer {
      text-align: center;
      padding: 28px 20px 16px;
      font-size: 0.76rem;
      color: var(--texto-suave);
    }

    @media (min-width: 600px) {
      .status-icone-grande { font-size: 5rem; }
      .status-titulo { font-size: 2rem; }
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/notifications.js" defer></script>
</head>
<body>

  <header class="pedido-header">
    <div class="pedido-header-logo">
      <img src="/imagens/logo dr.coxinha app.png" alt="Dr. Coxinha" onerror="this.style.display='none'">
      <div>
        <h1>Dr. Coxinha</h1>
        <p>Acompanhar pedido</p>
      </div>
    </div>
    <div class="badge-ao-vivo" id="badge-vivo">Ao vivo</div>
  </header>

  <div class="pedido-wrap" id="conteudo">
    <!-- Skeleton inicial -->
    <div class="skeleton">
      <div class="shimmer skeleton-circle"></div>
      <div class="shimmer skeleton-line short"></div>
      <div class="shimmer skeleton-line medium"></div>
    </div>
    <div class="skeleton">
      <div class="shimmer skeleton-line" style="width:40%;margin-bottom:14px;"></div>
      <div class="shimmer skeleton-line"></div>
      <div class="shimmer skeleton-line"></div>
      <div class="shimmer skeleton-line"></div>
    </div>
  </div>

  <footer class="pedido-footer">
    Feito com ❤️ pelo <strong>Dr. Coxinha Delivery</strong>
  </footer>

  <script>
    const API = '/api';
    const POLLING_MS = 12000;

    let pedidoAtual = null;
    let statusAnterior = null;
    let pollingTimer = null;

    // Etapas de progresso para entrega
    const ETAPAS_ENTREGA = [
      { key: 'pendente',    emoji: '🕐', titulo: 'Pedido Recebido',   desc: 'Aguardando confirmação da loja.',    hora: '' },
      { key: 'aceito',      emoji: '✅', titulo: 'Pedido Aceito',      desc: 'Confirmado! Vamos preparar agora.',  hora: '' },
      { key: 'preparando',  emoji: '🍳', titulo: 'Preparando',         desc: 'Saindo fresquinho do óleo! 🥟',     hora: '' },
      { key: 'saindo',      emoji: '🛵', titulo: 'Saiu para Entrega',  desc: 'Entregador a caminho do seu endereço.', hora: '' },
      { key: 'entregue',    emoji: '🎉', titulo: 'Entregue!',          desc: 'Obrigado pela preferência! ❤️',     hora: '' }
    ];

    const ETAPAS_RETIRADA = [
      { key: 'pendente',    emoji: '🕐', titulo: 'Pedido Recebido',     desc: 'Aguardando confirmação da loja.',    hora: '' },
      { key: 'aceito',      emoji: '✅', titulo: 'Pedido Aceito',        desc: 'Confirmado! Vamos preparar agora.', hora: '' },
      { key: 'preparando',  emoji: '🍳', titulo: 'Preparando',           desc: 'Saindo fresquinho do óleo! 🥟',    hora: '' },
      { key: 'saindo',      emoji: '📦', titulo: 'Pronto para Retirar', desc: 'Pode vir buscar na loja!',          hora: '' },
      { key: 'entregue',    emoji: '🎉', titulo: 'Retirado!',            desc: 'Obrigado pela preferência! ❤️',    hora: '' }
    ];

    const TOAST_MSG = {
      pendente:   { emoji: '🕐', titulo: 'Pedido recebido!',     sub: 'Aguardando confirmação da loja' },
      aceito:     { emoji: '✅', titulo: 'Pedido aceito!',         sub: 'Em breve começaremos o preparo' },
      preparando: { emoji: '🍳', titulo: 'Pedido em preparo!',    sub: 'Salgadinhos saindo do óleo 🥟' },
      saindo:     { emoji: '🛵', titulo: 'Saiu para entrega!',    sub: 'Já está a caminho do seu endereço' },
      entregue:   { emoji: '🎉', titulo: 'Pedido entregue!',      sub: 'Obrigado pela preferência! ❤️' },
      cancelado:  { emoji: '❌', titulo: 'Pedido cancelado',      sub: 'Em caso de dúvida, fale com a loja' }
    };

    const STATUS_LABEL = {
      pendente:   'Aguardando confirmação',
      aceito:     'Pedido Aceito!',
      preparando: 'Preparando seu pedido',
      saindo:     'Saiu para Entrega! 🛵',
      entregue:   'Pedido Entregue! 🎉',
      cancelado:  'Pedido Cancelado ❌'
    };

    function fmtPreco(v) {
      return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',');
    }

    function fmtHora(iso) {
      try { return new Date(iso).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }); }
      catch { return ''; }
    }

    function indiceEtapa(status) {
      return ETAPAS_ENTREGA.findIndex(e => e.key === status);
    }

    // ===== BUSCAR PEDIDO =====
    async function buscarPedido() {
      const token = new URLSearchParams(location.search).get('token');
      if (!token) {
        renderizarErro('Link inválido', 'O link de acompanhamento está incompleto. Use o link completo recebido após o pedido.');
        return null;
      }
      try {
        const r = await fetch(`${API}/pedidos/${encodeURIComponent(token)}`, { cache: 'no-store' });
        if (r.status === 404) { renderizarErro('Pedido não encontrado', 'Esse pedido não existe ou foi removido. Confira o link.'); return null; }
        if (!r.ok) throw new Error('Erro ' + r.status);
        return await r.json();
      } catch (e) {
        renderizarErro('Erro de conexão', 'Não conseguimos carregar seu pedido. Verifique a internet e recarregue.');
        return null;
      }
    }

    // ===== ERRO =====
    function renderizarErro(titulo, desc) {
      document.getElementById('conteudo').innerHTML = `
        <div class="estado-vazio">
          <span class="emoji">😕</span>
          <h2>${titulo}</h2>
          <p>${desc}</p>
          <a href="/" style="display:inline-block;margin-top:22px;color:var(--laranja-esc);font-weight:700;text-decoration:none;">← Voltar ao cardápio</a>
        </div>`;
      pararPolling();
    }

    // ===== RENDERIZAR =====
    function renderizar(p) {
      const ehEntrega = p.tipoEntrega === 'entrega';
      const ehCancelado = p.status === 'cancelado';
      const etapas = ehEntrega ? ETAPAS_ENTREGA : ETAPAS_RETIRADA;
      const idxAtual = ehCancelado ? -1 : indiceEtapa(p.status);

      // ---- STATUS CARD ----
      let cardHtml;
      if (ehCancelado) {
        cardHtml = `
          <div class="status-card cancelado">
            <p class="status-pedido-id">PEDIDO • ${fmtHora(p.criadoEm)}</p>
            <div class="status-icone-grande">❌</div>
            <h2 class="status-titulo">Pedido Cancelado</h2>
            <p class="status-descricao">Pedido cancelado. Se tiver dúvidas, fale com a loja.</p>
          </div>`;
      } else {
        const etapaAtual = etapas[idxAtual] || etapas[0];
        const statusFinais = ['entregue'];
        cardHtml = `
          <div class="status-card" id="status-card">
            <p class="status-pedido-id">PEDIDO • ${fmtHora(p.criadoEm)}</p>
            <div class="status-icone-grande">${etapaAtual.emoji}</div>
            <h2 class="status-titulo">${STATUS_LABEL[p.status] || etapaAtual.titulo}</h2>
            <p class="status-descricao">${etapaAtual.desc}</p>
            ${!statusFinais.includes(p.status) ? `
              <div class="status-tempo">⏱️ ${ehEntrega ? (p.tempoEstimadoEntrega || '30–50 min') : (p.tempoEstimadoRetirada || '15–20 min')}</div>` : ''}
          </div>`;
      }

      // ---- STEPS ----
      const stepsHtml = etapas.map((etapa, i) => {
        let classe = '';
        let horaEl = '';
        if (ehCancelado) {
          classe = i === 0 ? 'concluido' : (i === 1 ? 'cancelado' : '');
        } else if (i < idxAtual) {
          classe = 'concluido';
          // Busca hora no histórico
          const hist = (p.historico || []).find(h => h.status === etapa.key);
          if (hist) horaEl = `<div class="step-hora">${fmtHora(hist.data)}</div>`;
          else horaEl = `<div class="step-hora">✓</div>`;
        } else if (i === idxAtual) {
          classe = 'atual';
          const hist = (p.historico || []).filter(h => h.status === etapa.key);
          const ultimo = hist[hist.length - 1];
          if (ultimo) horaEl = `<div class="step-hora">${fmtHora(ultimo.data)}</div>`;
          else horaEl = `<div class="step-hora">Agora</div>`;
        }
        return `
          <div class="step ${classe}">
            <div class="step-col">
              <div class="step-bolinha">${i < idxAtual ? '✓' : i + 1}</div>
              <div class="step-linha"></div>
            </div>
            <div class="step-conteudo">
              <div class="step-nome">${etapa.titulo}</div>
              <div class="step-desc">${etapa.desc}</div>
              ${horaEl}
            </div>
          </div>`;
      }).join('');

      // ---- ITENS ----
      const itensHtml = (p.itens || []).map(item => `
        <div class="item-pedido">
          <div>
            <div class="item-pedido-nome">${item.nome}</div>
            <div class="item-pedido-qtd">${item.quantidade}× — ${fmtPreco(item.preco)} cada</div>
          </div>
          <div class="item-pedido-preco">${fmtPreco(item.subtotal || item.preco * item.quantidade)}</div>
        </div>`).join('');

      const subtotal = p.subtotal || (p.total - (p.taxaEntrega || 0));

      // ---- ENDEREÇO ----
      let enderecoHtml = '';
      if (ehEntrega && p.cliente?.endereco) {
        const e = p.cliente;
        enderecoHtml = `
          <div class="info-card">
            <div class="info-card-titulo">📍 Endereço de Entrega</div>
            <div class="endereco-box">
              ${e.endereco || ''}${e.complemento ? ', ' + e.complemento : ''}<br>
              ${e.bairro ? e.bairro + ' — ' : ''}${e.cidade || ''}
              ${e.cep ? '<br>CEP: ' + e.cep : ''}
              ${e.referencia ? `<br><span class="endereco-ref">Ref: ${e.referencia}</span>` : ''}
            </div>
          </div>`;
      } else if (!ehEntrega && p.enderecoLoja) {
        enderecoHtml = `
          <div class="info-card">
            <div class="info-card-titulo">🏪 Onde retirar</div>
            <div class="endereco-box">${p.enderecoLoja}</div>
          </div>`;
      }

      // ---- PAGAMENTO ----
      const metodos = { dinheiro: '💵 Dinheiro', pix: '📲 PIX', cartao: '💳 Cartão' };
      let pagamentoHtml = '';
      if (p.pagamento?.metodo) {
        pagamentoHtml = `
          <div class="info-card">
            <div class="info-card-titulo">💳 Pagamento</div>
            <div class="pagamento-linha">
              <span class="pagamento-key">Forma</span>
              <span class="pagamento-val">${metodos[p.pagamento.metodo] || p.pagamento.metodo}</span>
            </div>
            ${p.pagamento.troco ? `
            <div class="pagamento-linha">
              <span class="pagamento-key">Troco para</span>
              <span class="pagamento-val">${fmtPreco(p.pagamento.troco)}</span>
            </div>` : ''}
          </div>`;
      }

      // ---- OBSERVAÇÃO ----
      const obsHtml = p.observacao ? `
        <div class="info-card">
          <div class="info-card-titulo">📝 Observação</div>
          <div class="obs-box">${p.observacao}</div>
        </div>` : '';

      // ---- SAUDAÇÃO ----
      const nome = p.cliente?.nome?.split(' ')[0];
      const saudacaoHtml = nome ? `
        <p class="saudacao" style="margin-bottom:10px;">
          Olá, <strong>${nome}</strong>! 👋
        </p>` : '';

      // ---- BOTÃO WHATSAPP LOJA ----
      const whatsLoja = p.telefoneLoja
        ? `<a class="btn-acao btn-acao-whats" href="https://wa.me/${p.telefoneLoja.replace(/\D/g,'')}?text=${encodeURIComponent('Olá! Tenho uma dúvida sobre meu pedido.')}" target="_blank">💬 Falar com a loja</a>`
        : '';

      // ---- MONTA TUDO ----
      document.getElementById('conteudo').innerHTML = `
        ${saudacaoHtml}

        <div class="pwa-banner" id="pwa-banner">
          <div class="pwa-banner-icone">📱</div>
          <div class="pwa-banner-info">
            <div class="pwa-banner-titulo">Instale como app</div>
            <div class="pwa-banner-sub">Acompanhe na tela inicial do celular</div>
          </div>
          <button class="pwa-banner-btn" onclick="instalarPwa()">Instalar</button>
          <button class="pwa-banner-close" onclick="fecharPwaBanner()">×</button>
        </div>

        ${cardHtml}

        <div class="steps-card">
          <div class="steps-titulo">📋 Progresso do Pedido</div>
          <div class="steps">${stepsHtml}</div>
        </div>

        <div class="info-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div class="info-card-titulo" style="margin:0;">🛒 Seu Pedido</div>
            <span class="tipo-badge">${ehEntrega ? '🛵 Entrega' : '🏪 Retirada'}</span>
          </div>
          ${itensHtml}
          <div class="totais">
            <div class="totais-linha"><span>Subtotal</span><span>${fmtPreco(subtotal)}</span></div>
            ${(p.taxaEntrega && p.taxaEntrega > 0) ? `
            <div class="totais-linha"><span>Taxa de entrega</span><span>${fmtPreco(p.taxaEntrega)}</span></div>` : ''}
            <div class="totais-linha total"><span>Total</span><span>${fmtPreco(p.total)}</span></div>
          </div>
        </div>

        ${enderecoHtml}
        ${pagamentoHtml}
        ${obsHtml}

        <div class="acoes-card">
          ${whatsLoja}
          <button class="btn-acao btn-acao-secundario" onclick="window.location.href='/'">🥟 Fazer outro pedido</button>
        </div>
      `;

      // Vibração ao mudar status
      if (statusAnterior !== null && statusAnterior !== p.status) {
        const card = document.getElementById('status-card');
        if (card) card.classList.add('atualizado');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        mostrarToastStatus(p.status);
      }
      statusAnterior = p.status;

      // Título da aba
      document.title = `Pedido — ${STATUS_LABEL[p.status] || p.status} | Dr. Coxinha`;

      // Badge ao vivo
      const badge = document.getElementById('badge-vivo');
      if (badge && (p.status === 'entregue' || p.status === 'cancelado')) {
        badge.style.background = '#f0f0f0';
        badge.style.color = '#999';
        badge.textContent = p.status === 'cancelado' ? '✕ Cancelado' : '✓ Entregue';
      }

      // Para polling em status finais
      if (['entregue', 'cancelado'].includes(p.status)) pararPolling();

      // Banner PWA
      verificarPwa();

      pedidoAtual = p;
    }

    // ===== TOAST =====
    function mostrarToastStatus(status) {
      const antigo = document.getElementById('toast-status');
      if (antigo) antigo.remove();
      const cfg = TOAST_MSG[status];
      if (!cfg) return;

      const el = document.createElement('div');
      el.id = 'toast-status';
      el.className = 'toast-status';
      el.innerHTML = `
        <div class="toast-status-icone">${cfg.emoji}</div>
        <div class="toast-status-conteudo">
          <div class="toast-status-titulo">${cfg.titulo}</div>
          <div class="toast-status-sub">${cfg.sub}</div>
        </div>`;
      document.body.appendChild(el);
      requestAnimationFrame(() => el.classList.add('visivel'));
      setTimeout(() => {
        el.classList.remove('visivel');
        setTimeout(() => el.remove(), 600);
      }, 5000);
    }

    // ===== POLLING =====
    async function tick() {
      const p = await buscarPedido();
      if (p) renderizar(p);
    }

    function iniciarPolling() {
      pararPolling();
      pollingTimer = setInterval(tick, POLLING_MS);
    }

    function pararPolling() {
      if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
    }

    // ===== PWA =====
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      verificarPwa();
    });

    function verificarPwa() {
      const banner = document.getElementById('pwa-banner');
      if (!banner) return;
      const dispensado = localStorage.getItem('dc_pwa_dispensado');
      if (deferredPrompt && !dispensado && !window.matchMedia('(display-mode: standalone)').matches) {
        banner.classList.add('visivel');
      }
    }

    async function instalarPwa() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') fecharPwaBanner();
      deferredPrompt = null;
    }

    function fecharPwaBanner() {
      localStorage.setItem('dc_pwa_dispensado', '1');
      const b = document.getElementById('pwa-banner');
      if (b) b.classList.remove('visivel');
    }

    // ===== SOCKET.IO =====
    let socketCliente = null;
    let conectadoViaSocket = false;

    function conectarSocket(token) {
      if (typeof io === 'undefined') return false;
      try {
        socketCliente = io({ transports: ['websocket', 'polling'] });

        socketCliente.on('connect', () => {
          socketCliente.emit('join:pedido', token);
          conectadoViaSocket = true;
          pararPolling();
          pollingTimer = setInterval(tick, 60000); // fallback 1 min
        });

        socketCliente.on('disconnect', () => {
          conectadoViaSocket = false;
          iniciarPolling();
        });

        socketCliente.on('pedido:atualizado', (pedido) => {
          renderizar(pedido);
        });

        return true;
      } catch (e) {
        return false;
      }
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', async () => {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('/service-worker.js'); } catch (e) {}
      }

      // Carregamento inicial
      await tick();

      const token = new URLSearchParams(location.search).get('token');
      if (token) {
        const socketOk = conectarSocket(token);
        if (!socketOk) iniciarPolling();

        // Oferece push notification 4s após carregar
        setTimeout(() => {
          if (window.PushNotifications) {
            window.PushNotifications.mostrarBannerPermissao({ pedidoToken: token });
          }
        }, 4000);
      }
    });

    // Pausa polling com aba oculta
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        pararPolling();
      } else {
        tick();
        if (!conectadoViaSocket) iniciarPolling();
      }
    });
  </script>
</body>
</html>
